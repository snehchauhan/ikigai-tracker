<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ikigai Finder Pro</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
margin:0;
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:40px;
color:white;
}

h1{
margin-bottom:10px;
}

.subtitle{
margin-bottom:30px;
opacity:0.9;
}

.container{
background:white;
color:black;
padding:25px;
border-radius:12px;
width:420px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#667eea;
color:white;
cursor:pointer;
font-size:15px;
margin-top:10px;
}

button:hover{
background:#5563d6;
}

/* IKIGAI DIAGRAM */

.ikigai-diagram{
position:relative;
width:320px;
height:320px;
margin:40px 0;
}

.circle{
position:absolute;
width:160px;
height:160px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-weight:bold;
color:white;
opacity:0.4;
transition:0.4s;
}

.circle.active{
opacity:1;
transform:scale(1.05);
}

.love{
background:#ff6b6b;
top:0;
left:80px;
}

.skill{
background:#4dabf7;
top:80px;
left:0;
}

.need{
background:#51cf66;
top:80px;
right:0;
}

.pay{
background:#fcc419;
bottom:0;
left:80px;
color:black;
}

.center{
position:absolute;
top:120px;
left:120px;
width:80px;
height:80px;
background:white;
color:black;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* RESULTS */

.entries{
width:420px;
margin-top:20px;
}

.card{
background:white;
color:black;
padding:18px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.progress{
background:#eee;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.progress-bar{
height:10px;
background:#667eea;
width:0%;
transition:1s;
}

.ai{
margin-top:10px;
font-weight:bold;
color:#667eea;
}

.delete{
background:#ff4d4d;
margin-top:10px;
}

</style>

</head>

<body>

<h1>🌸 Ikigai Finder Pro</h1>
<div class="subtitle">Discover your purpose</div>

<div class="container">

<input id="love" placeholder="What do you love?">
<input id="skill" placeholder="What are you good at?">
<input id="need" placeholder="What the world needs?">
<input id="pay" placeholder="What you can be paid for?">

<button onclick="addEntry()">Find My Ikigai</button>

</div>

<div class="ikigai-diagram">

<div id="c1" class="circle love">Love</div>
<div id="c2" class="circle skill">Skill</div>
<div id="c3" class="circle need">Need</div>
<div id="c4" class="circle pay">Paid</div>

<div class="center">IKIGAI</div>

</div>

<div id="entries" class="entries"></div>

<script>

let entries = JSON.parse(localStorage.getItem("ikigai")) || [];

function save(){
localStorage.setItem("ikigai",JSON.stringify(entries));
}

function aiSuggestion(entry){

const text=(entry.love+" "+entry.skill+" "+entry.need+" "+entry.pay).toLowerCase();

if(text.includes("write") || text.includes("content"))
return "Suggested Career: Content Creator";

if(text.includes("design"))
return "Suggested Career: UI/UX Designer";

if(text.includes("code") || text.includes("program"))
return "Suggested Career: Software Developer";

if(text.includes("teach"))
return "Suggested Career: Teacher / Coach";

if(text.includes("video"))
return "Suggested Career: YouTuber / Video Creator";

return "Suggested Career: Entrepreneur";

}

function calculatePercent(entry){

let score=0;

if(entry.love){score+=25;document.getElementById("c1").classList.add("active");}
if(entry.skill){score+=25;document.getElementById("c2").classList.add("active");}
if(entry.need){score+=25;document.getElementById("c3").classList.add("active");}
if(entry.pay){score+=25;document.getElementById("c4").classList.add("active");}

return score;

}

function show(){

const box=document.getElementById("entries");
box.innerHTML="";

entries.forEach((e,i)=>{

let percent=calculatePercent(e);

let card=document.createElement("div");
card.className="card";

card.innerHTML=
"<p><b>Love:</b> "+e.love+"</p>"+
"<p><b>Skill:</b> "+e.skill+"</p>"+
"<p><b>Need:</b> "+e.need+"</p>"+
"<p><b>Paid:</b> "+e.pay+"</p>"+

"<div class='progress'><div class='progress-bar' style='width:"+percent+"%'></div></div>"+

"<div class='ai'>"+aiSuggestion(e)+"</div>"+

"<button class='delete' onclick='removeEntry("+i+")'>Delete</button>";

box.appendChild(card);

});

}

function addEntry(){

const love=document.getElementById("love").value;
const skill=document.getElementById("skill").value;
const need=document.getElementById("need").value;
const pay=document.getElementById("pay").value;

if(!love || !skill || !need || !pay){
alert("Please fill all fields");
return;
}

entries.push({love,skill,need,pay});

save();
show();

document.getElementById("love").value="";
document.getElementById("skill").value="";
document.getElementById("need").value="";
document.getElementById("pay").value="";

}

function removeEntry(i){

entries.splice(i,1);

save();
show();

}

show();

</script>

</body>
</html>
