<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ikigai Finder</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
margin:0;
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:40px;
color:white;
}

h1{
margin-bottom:20px;
}

.container{
background:white;
color:black;
padding:25px;
border-radius:12px;
width:400px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#667eea;
color:white;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#5563d6;
}

.entries{
margin-top:30px;
width:420px;
}

.card{
background:white;
color:black;
padding:18px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.percent{
font-size:20px;
font-weight:bold;
margin-top:10px;
color:#667eea;
}

.delete{
background:#ff4d4d;
margin-top:10px;
}

.delete:hover{
background:#e63939;
}

/* IKIGAI DIAGRAM */

.ikigai-diagram{
position:relative;
width:320px;
height:320px;
margin:40px 0;
}

.circle{
position:absolute;
width:160px;
height:160px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-weight:bold;
color:white;
}

.love{
background:#ff6b6b;
top:0;
left:80px;
}

.skill{
background:#4dabf7;
top:80px;
left:0;
}

.need{
background:#51cf66;
top:80px;
right:0;
}

.pay{
background:#fcc419;
bottom:0;
left:80px;
color:black;
}

.center{
position:absolute;
top:120px;
left:120px;
width:80px;
height:80px;
background:white;
color:black;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<h1>🌸 Ikigai Finder</h1>

<div class="container">

<input id="love" placeholder="What do you love?">
<input id="skill" placeholder="What are you good at?">
<input id="need" placeholder="What the world needs?">
<input id="pay" placeholder="What you can be paid for?">

<button onclick="addEntry()">Calculate Ikigai</button>

</div>

<div class="ikigai-diagram">

<div class="circle love">❤️<br>Love</div>
<div class="circle skill">🧠<br>Skill</div>
<div class="circle need">🌍<br>Need</div>
<div class="circle pay">💰<br>Paid</div>

<div class="center">IKIGAI</div>

</div>

<div id="entries" class="entries"></div>

<script>

let entries = JSON.parse(localStorage.getItem("ikigai")) || [];

function save(){
localStorage.setItem("ikigai",JSON.stringify(entries));
}

function calculatePercent(entry){

let score=0;

if(entry.love) score+=25;
if(entry.skill) score+=25;
if(entry.need) score+=25;
if(entry.pay) score+=25;

return score;

}

function show(){

const box=document.getElementById("entries");
box.innerHTML="";

entries.forEach((e,i)=>{

let percent=calculatePercent(e);

let card=document.createElement("div");
card.className="card";

card.innerHTML=
"<p><b>Love:</b> "+e.love+"</p>"+
"<p><b>Skill:</b> "+e.skill+"</p>"+
"<p><b>Need:</b> "+e.need+"</p>"+
"<p><b>Paid:</b> "+e.pay+"</p>"+
"<div class='percent'>Ikigai Score: "+percent+"%</div>"+
"<button class='delete' onclick='removeEntry("+i+")'>Delete</button>";

box.appendChild(card);

});

}

function addEntry(){

const love=document.getElementById("love").value;
const skill=document.getElementById("skill").value;
const need=document.getElementById("need").value;
const pay=document.getElementById("pay").value;

if(!love || !skill || !need || !pay){
alert("Please fill all fields");
return;
}

entries.push({love,skill,need,pay});

save();
show();

document.getElementById("love").value="";
document.getElementById("skill").value="";
document.getElementById("need").value="";
document.getElementById("pay").value="";

}

function removeEntry(i){

entries.splice(i,1);

save();
show();

}

show();

</script>

</body>
</html>
