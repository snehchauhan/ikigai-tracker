<head>
<meta charset="UTF-8">
<title>Ikigai Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Ikigai Tracker</h1>
<p>Discover your life purpose</p>
</header>

<div class="container">

<h2>Add Ikigai Entry</h2>

<input id="love" placeholder="❤️ What you love">

<input id="good" placeholder="🧠 What you are good at">

<input id="world" placeholder="🌍 What the world needs">

<input id="paid" placeholder="💰 What you can be paid for">

<button onclick="addEntry()">Add Entry</button>

</div>

<div class="entries">

<h2>Your Ikigai Entries</h2>

<div id="list"></div>

</div>

<script src="app.js"></script>

</body>
</html>
